MODEL:
  NAME: resnet34_unet
  TYPE: concatenated
  DESCRIPTION: UNet with pretrained ResNet34 encoder

ENCODER:
  NAME: resnet34
  WEIGHTS: imagenet

DATASET:
  ROOT: F:/datasets/galaxeye-change-detection
  PATCH_SIZE: 256
  MODE: concatenated
  NUM_CLASSES: 2

TRAIN:
  BATCH_SIZE: 4
  EPOCHS: 50
  LR: 0.0001
  NUM_WORKERS: 0
  OPTIMIZER: AdamW
  SCHEDULER: CosineAnnealingLR
  EARLY_STOPPING_PATIENCE: 5

LOSS:
  NAME: dice_focal

OUTPUT:
  CHECKPOINT_DIR: outputs/checkpoints/resnet34_unet
  LOG_DIR: outputs/logs/resnet34_unet