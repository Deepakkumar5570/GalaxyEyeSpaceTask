MODEL:
  NAME: attention_siamese
  TYPE: siamese
  DESCRIPTION: Attention Siamese UNet with CBAM attention and multi-scale fusion

ENCODER:
  NAME: resnet34
  WEIGHTS: imagenet
  SHARED: true

ATTENTION:
  NAME: CBAM
  CHANNEL_ATTENTION: true
  SPATIAL_ATTENTION: true

FUSION:
  TYPE: late_fusion

DATASET:
  ROOT: F:/datasets/galaxeye-change-detection
  PATCH_SIZE: 256
  MODE: siamese
  NUM_CLASSES: 2

TRAIN:
  BATCH_SIZE: 4
  EPOCHS: 50
  LR: 0.0001
  NUM_WORKERS: 0
  OPTIMIZER: AdamW
  SCHEDULER: CosineAnnealingLR
  EARLY_STOPPING_PATIENCE: 5

LOSS:
  NAME: dice_focal

AUGMENTATION:
  HORIZONTAL_FLIP: true
  VERTICAL_FLIP: true
  ROTATE_90: true
  SHIFT_SCALE_ROTATE: true
  BRIGHTNESS_CONTRAST: true
  RANDOM_GAMMA: true
  GAUSS_NOISE: true
  GAUSSIAN_BLUR: true
  COARSE_DROPOUT: true

OUTPUT:
  CHECKPOINT_DIR: outputs/checkpoints/attention_siamese
  LOG_DIR: outputs/logs/attention_siamese